# Brisca frontend — serves the static site and reverse-proxies Socket.io to the
# backend so the browser uses a single origin (no CORS). Installed as
# /etc/nginx/conf.d/default.conf inside the nginx-unprivileged image.

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets (index.html, js/, css/, cards/).
    location / {
        try_files $uri $uri/ =404;
    }

    # Socket.io: proxy HTTP long-polling and the WebSocket upgrade to the backend.
    location /socket.io/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;   # keep long-lived sockets open
        proxy_send_timeout 86400s;
    }
}
